apiVersion: 1

providers:
  - name: 'App Dashboards'
    type: file
    disableDeletion: false
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards/app
    
  - name: 'Kafka Dashboards'
    type: file
    disableDeletion: false
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards/kafka
  
  - name: 'Postgres Dashboards'
    type: file
    disableDeletion: false
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards/postgres

  - name: 'Redis Dashboards'
    type: file
    disableDeletion: true
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards/redis
