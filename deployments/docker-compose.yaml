services:
  redis:
    container_name: url_redis_cache
    image: redis:7-alpine
    env_file:
      - ../.env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17
    container_name: url_postgres
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./data/postgres/urls_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urls"]
      interval: 3s
      timeout: 3s
      retries: 5
  
  url_app:
    container_name: url_app
    build:
      context: ..
      dockerfile: cmd/Dockerfile
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app_net
    restart: always

  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r4
    container_name: url_shortener_kafka
    env_file:
      - ../.env
    ports:
      - "9094:9094"
    user: "root"
    environment:
      # Настройки KRaft режима
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Слушаем два порта: 9092 для контейнеров, 9094 для внешнего мира (хоста)
      - KAFKA_CFG_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      # Рекламируем имя контейнера "kafka" для сети Docker и "localhost" для хоста
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_LEVEL=DEBUG
    volumes:
      - ./data/kafka:/bitnami/kafka:rw
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-cluster.sh cluster-id --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s


volumes:
  pgdata:
  redis_data:
  kafka_data:

networks:
  app_net:
    driver: bridge