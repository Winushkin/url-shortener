server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s;

    # Логика самого приложения (сокращателя)
    location / {
        set $app_backend "http://url_app:8080";
        proxy_pass $app_backend; 

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Логика мониторинга
   location /monitoring/ {
        # СЛЭША НА КОНЦЕ НЕТ! Передаем путь целиком
        proxy_pass http://url_shortener_grafana:3000; 

        # Передаем оригинальный заголовок Host (localhost)
        proxy_set_header Host $host; 
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets для живых графиков
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
