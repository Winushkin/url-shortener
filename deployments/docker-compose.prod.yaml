services:

  nginx:
    image: nginx:alpine
    container_name: url_nginx
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - url_app
    networks:
      - router
  
  url_app:
    image: ghcr.io/Winushkin/url-shortener:latest
    container_name: url_app
    env_file:
      - ../.env
    depends_on:        
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - app_net
      - router
    restart: always

  redis:
    container_name: url_redis_cache
    image: redis:7-alpine
    env_file:
      - ../.env
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5


  postgres:
    image: postgres:17
    container_name: url_postgres
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urls"]
      interval: 3s
      timeout: 3s
      retries: 5

  kafka:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r4
    container_name: url_shortener_kafka
    env_file:
      - ../.env
    environment:
      # Настройки KRaft режима
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Слушаем два порта: 9092 для контейнеров, 9094 для внешнего мира (хоста)
      - KAFKA_CFG_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      # Рекламируем имя контейнера "kafka" для сети Docker и "localhost" для хоста
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka:rw
    networks:
      - app_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-cluster.sh cluster-id --bootstrap-server kafka:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  kafka-init:
    image: bitnamilegacy/kafka:3.7.1-debian-12-r4
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "sh", "-c" ]
    networks:
      - app_net
    restart: no
    command:
      - |
        # Ожидаем, пока Kafka станет доступна на порту 9092
        echo "Waiting for Kafka to be ready..."
        /opt/bitnami/kafka/bin/kafka-cluster.sh cluster-id --bootstrap-server kafka:9092 || true
        
        echo "Creating Kafka topics..."
        # Команда создания первого топика (имя: url.clicks, партиций: 3)
        /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic url.clicks --partitions 3 --replication-factor 1
        
        echo "All topics created successfully!"

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: url_shortener_kafka_exporter
    command: --kafka.server=kafka:9092
    networks:
      - monitoring
      - app_net
    depends_on:
      kafka:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: url_shortener_postgres_exporter
    env_file:
      - ../.env
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - postgres
    networks:
      - monitoring
      - app_net

  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    container_name: url_shortener_redis_exporter
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    networks:
      - monitoring
      - app_net

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: url_shortener_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - monitoring
      - app_net
  
  grafana:
    image: grafana/grafana:10.0.0
    container_name: url_shortener_grafana
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana

      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_PASSWORD}
      - GF_SERVER_DOMAIN=${DOMAIN_NAME}
      - GF_SERVER_ROOT_URL=${PROTOCOL_NAME}://${DOMAIN_NAME}/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/main/main-dashboard.json
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
    restart: unless-stopped
    networks:
      - monitoring
      - router

volumes:
  grafana_data:
  prometheus_data:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  app_net:
    driver: bridge
  monitoring:
    driver: bridge
  router:
    driver: bridge