services:
  test_postgres:
    image: postgres:17
    container_name: postgres_test
    command: ["postgres", "-p", "5430"] 
    environment:
      POSTGRES_HOST: test_postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: test_urls
      POSTGRES_MIN_CONNS: 1
      POSTGRES_MAX_CONNS: 10
    ports:
      - "5430:5430"
    volumes:
      - ./data/test_postgres/urls_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test_urls"]
      interval: 3s
      timeout: 3s
      retries: 5


volumes:
  test_pgdata: