<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сокращатель ссылок</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background: #f7f8fa;
            min-height: 100vh;
        }

        /* ── Навбар ── */
        nav {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 52px;
        }

        .nav-brand {
            font-weight: 700;
            font-size: 16px;
            color: #222;
            text-decoration: none;
        }

        .nav-monitoring {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            background: #f0f6ff;
            color: #007BFF;
            border: 1px solid #cce0ff;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
        }

        .nav-monitoring:hover {
            background: #dceeff;
            border-color: #007BFF;
        }

        .nav-monitoring svg {
            flex-shrink: 0;
        }

        /* ── Основной контент ── */
        main {
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin-bottom: 24px;
            font-size: 24px;
            color: #222;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: #007BFF;
        }

        button[type="submit"] {
            padding: 10px 28px;
            font-size: 16px;
            cursor: pointer;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.15s;
        }

        button[type="submit"]:hover {
            background: #0062cc;
        }

        #result {
            margin-top: 24px;
            font-size: 18px;
            font-weight: bold;
            min-height: 28px;
        }

        a { color: #007BFF; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav>
        <a class="nav-brand" href="/">🔗 URL Shortener</a>
        <a class="nav-monitoring" href="/monitoring" target="_blank">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
            Мониторинг
        </a>
    </nav>

    <main>
        <h2>Сократить ссылку</h2>
        <form id="shortenForm">
            <input type="text" id="longUrl" placeholder="Вставьте длинную ссылку" required>
            <br>
            <button type="submit">Сократить</button>
        </form>
        <div id="result"></div>
    </main>

    <script>
        document.getElementById('shortenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = 'Генерируем...';
            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: longUrl })
                });
                if (!response.ok) throw new Error('Ошибка сервера');
                const data = await response.json();
                resultDiv.innerHTML = `Короткая ссылка: <a href="${data.short_url}" target="_blank">${data.view_url}</a>`;
            } catch (err) {
                resultDiv.innerText = 'Произошла ошибка при сокращении';
            }
        });
    </script>

</body>
</html>
